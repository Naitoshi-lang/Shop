<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Каталог</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>📚 BookStore</h1>
                <p>Книги для всех</p>
            </div>
            
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="menu-icon">☰</label>
            
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html" class="active">Каталог</a>
                <a href="contacts.html">Контакты</a>
                <a href="contacts.html#cart" class="cart-icon">
                    🛒 Корзина <span class="cart-count" id="cartCount">0</span>
                </a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="section-title">Каталог книг</h1>
            
            <!-- Фильтры -->
            <div class="filters">
                <button class="filter-btn active" data-genre="all">Все</button>
                <button class="filter-btn" data-genre="classic">Классика</button>
                <button class="filter-btn" data-genre="fantasy">Фэнтези</button>
                <button class="filter-btn" data-genre="sci-fi">Фантастика</button>
                <button class="filter-btn" data-genre="dystopia">Антиутопия</button>
            </div>
            
            <!-- Сетка товаров -->
            <div class="catalog-grid" id="catalogGrid">
                <!-- Книги будут загружены через JS -->
            </div>
            
            <!-- Пагинация -->
            <div class="pagination">
                <a href="#" class="active">1</a>
                <a href="#">2</a>
                <a href="#">3</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>📚 BookStore</h4>
                    <p>Интернет-магазин книг с 2024 года</p>
                </div>
                <div class="footer-section">
                    <h4>Навигация</h4>
                    <a href="index.html">Главная</a>
                    <a href="catalog.html">Каталог</a>
                    <a href="contacts.html">Контакты</a>
                </div>
                <div class="footer-section">
                    <h4>Контакты</h4>
                    <p>📞 +7 (800) 123-45-67</p>
                    <p>✉ info@bookstore.ru</p>
                </div>
                <div class="footer-section">
                    <h4>Мы в соцсетях</h4>
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-vk"></i></a>
                        <a href="#"><i class="fab fa-telegram"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2024 BookStore. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script>
        // Данные книг
        const books = [
            { id: 1, title: "Мастер и Маргарита", author: "Михаил Булгаков", price: 450, genre: "classic", rating: 4, img: "https://via.placeholder.com/250x300/2c3e50/white?text=Мастер+и+Маргарита" },
            { id: 2, title: "1984", author: "Джордж Оруэлл", price: 380, genre: "dystopia", rating: 5, img: "https://via.placeholder.com/250x300/2c3e50/white?text=1984" },
            { id: 3, title: "Гарри Поттер и философский камень", author: "Дж.К. Роулинг", price: 650, genre: "fantasy", rating: 5, img: "https://via.placeholder.com/250x300/2c3e50/white?text=Гарри+Поттер" },
            { id: 4, title: "Идиот", author: "Фёдор Достоевский", price: 520, genre: "classic", rating: 4, img: "https://via.placeholder.com/250x300/2c3e50/white?text=Идиот" },
            { id: 5, title: "Dune", author: "Фрэнк Герберт", price: 590, genre: "sci-fi", rating: 4, img: "https://via.placeholder.com/250x300/2c3e50/white?text=Dune" },
            { id: 6, title: "Алхимик", author: "Пауло Коэльо", price: 350, genre: "classic", rating: 4, img: "https://via.placeholder.com/250x300/2c3e50/white?text=Алхимик" },
            { id: 7, title: "Властелин колец", author: "Дж.Р.Р. Толкин", price: 1200, genre: "fantasy", rating: 5, img: "https://via.placeholder.com/250x300/2c3e50/white?text=Властелин+колец" },
            { id: 8, title: "451 градус по Фаренгейту", author: "Рэй Брэдбери", price: 420, genre: "dystopia", rating: 4, img: "https://via.placeholder.com/250x300/2c3e50/white?text=451+градус" }
        ];
        
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountElem = document.getElementById('cartCount');
            if (cartCountElem) cartCountElem.textContent = count;
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function addToCart(bookId) {
            const book = books.find(b => b.id === bookId);
            const existingItem = cart.find(item => item.id === bookId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...book, quantity: 1 });
            }
            
            updateCartCount();
            showToast(`${book.title} добавлена в корзину!`);
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--accent);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function renderBooks(filterGenre = 'all') {
            const grid = document.getElementById('catalogGrid');
            const filteredBooks = filterGenre === 'all' ? books : books.filter(b => b.genre === filterGenre);
            
            grid.innerHTML = filteredBooks.map(book => `
                <article class="book-card">
                    <img src="${book.img}" alt="${book.title}">
                    <div class="book-info">
                        <h3 class="book-title">${book.title}</h3>
                        <p class="book-author">${book.author}</p>
                        <p class="book-price">${book.price} ₽</p>
                        <div class="rating">${'★'.repeat(book.rating)}${'☆'.repeat(5-book.rating)}</div>
                        <button class="btn-small" onclick="addToCart(${book.id})">В корзину</button>
                    </div>
                </article>
            `).join('');
        }
        
        // Фильтрация
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderBooks(btn.dataset.genre);
            });
        });
        
        renderBooks();
        updateCartCount();
        
        // Добавляем стиль для анимации
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
